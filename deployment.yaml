apiVersion: apps/v1
kind: Deployment

metadata:
  name: college-event-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: college-event

  template:

    metadata:
      labels:
        app: college-event

    spec:

      containers:

      - name: college-event-container

        image: 23mis7014-devops-project:latest

        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8080